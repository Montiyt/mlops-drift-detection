name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Run Tests ───────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn scipy \
                      mlflow fastapi uvicorn \
                      prometheus-client pydantic \
                      pyarrow pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Show test summary
        run: echo "All drift detection tests passed successfully!"