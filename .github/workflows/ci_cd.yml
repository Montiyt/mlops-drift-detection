name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Run Tests ───────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn scipy \
                      mlflow fastapi uvicorn \
                      prometheus-client pydantic \
                      pyarrow pytest

      - name: Run tests
        run: pytest tests/ -v

  # ── Job 2: Lint Code ───────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run linter
        run: |
          flake8 src/ --max-line-length=120 \
                      --ignore=E501,W503 \
                      --exclude=__pycache__

  # ── Job 3: Build Docker Image ──────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile \
                       -t mlops-drift-detection:latest .

      - name: Verify image built
        run: docker images | grep mlops-drift-detection